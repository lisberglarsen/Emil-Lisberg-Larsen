name: Outlook Mailagent

on:
  schedule:
    # Kører 3× dagligt på hverdage (tider i UTC – Danmark er UTC+2 om sommeren)
    - cron: '30 5 * * 1-5'   # 07:30 dansk tid
    - cron: '0 10 * * 1-5'   # 12:00 dansk tid
    - cron: '0 14 * * 1-5'   # 16:00 dansk tid
  workflow_dispatch:          # Tillader manuel kørsel fra GitHub

jobs:
  run-mailagent:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Opsæt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer pakker
        run: pip install -r requirements.txt

      - name: Opret .env fil fra GitHub Secrets
        run: |
          cat > .env << EOF
          AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          HOURS_BACK=4
          SEND_EMAIL_REPORT=true
          EOF

      - name: Gendan Microsoft login-token
        run: |
          echo '${{ secrets.MSAL_TOKEN_CACHE }}' > .token_cache.json

      - name: Kør mailagenten
        run: python mail_agent.py

      - name: Gem opdateret login-token
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('.token_cache.json')) {
              const token = fs.readFileSync('.token_cache.json', 'utf8');
              await github.rest.actions.createOrUpdateRepoSecret({
                owner: context.repo.owner,
                repo: context.repo.repo,
                secret_name: 'MSAL_TOKEN_CACHE',
                encrypted_value: await (async () => {
                  const sodium = require('libsodium-wrappers');
                  await sodium.ready;
                  const key = (await github.rest.actions.getRepoPublicKey({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                  })).data;
                  const keyBytes = Buffer.from(key.key, 'base64');
                  const msgBytes = Buffer.from(token);
                  const encrypted = sodium.crypto_box_seal(msgBytes, keyBytes);
                  return Buffer.from(encrypted).toString('base64');
                })(),
                key_id: (await github.rest.actions.getRepoPublicKey({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                })).data.key_id,
              });
            }
